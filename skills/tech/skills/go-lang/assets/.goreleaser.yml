version: 2

# project_name: # TODO: set project name

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: app
    main: ./cmd/app # TODO: set binary entry point
    binary: app     # TODO: set binary name
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

