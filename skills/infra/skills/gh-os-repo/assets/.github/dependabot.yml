version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Keep language dependencies up to date
  # Uncomment and set the ecosystem for your project:
  # gomod, npm, pip, swift, cargo, maven, gradle, etc.
  #
  # - package-ecosystem: "<ecosystem>"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
  #   commit-message:
  #     prefix: "deps"
